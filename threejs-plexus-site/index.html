<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Plexus Experience</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        overflow: hidden;
        background: #0a0a0f;
      }
      
      #canvas-container {
        width: 100vw;
        height: 100vh;
        position: fixed;
        top: 0;
        left: 0;
      }
      
      .loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-family: 'Arial', sans-serif;
        font-size: 1.5rem;
        pointer-events: none;
        transition: opacity 0.5s ease;
      }
      
      .loading.hidden {
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div id="canvas-container"></div>
    <div class="loading" id="loading">Loading...</div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
